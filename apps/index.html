<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      background: #fafafa;
      color: #1a1a1a;
      padding: 0 16px;
      transition: background 0.2s, color 0.2s;
    }

    body.dark {
      background: #0f0818;
      color: #e2d9f3;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 0 80px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.6px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .meta {
      font-size: 14px;
      color: #6b7280;
    }

    body.dark .meta { color: #9d89c4; }

    .theme-toggle {
      background: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .theme-toggle:hover { border-color: #7c3aed; color: #7c3aed; background: rgba(124,58,237,0.05); }

    body.dark .theme-toggle { border-color: #2e1f4a; color: #9d89c4; }
    body.dark .theme-toggle:hover { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.08); }

    .theme-toggle svg { width: 16px; height: 16px; }
    .theme-toggle .icon-dark { display: none; }
    body.dark .theme-toggle .icon-light { display: none; }
    body.dark .theme-toggle .icon-dark { display: block; }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
    }

    .card {
      display: block;
      padding: 24px;
      background: #fff;
      border: 1.5px solid #ebebeb;
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .card:hover {
      border-color: #7c3aed;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.12);
      transform: translateY(-1px);
    }

    .card:active { transform: translateY(0); }

    body.dark .card { background: #1a0f2e; border-color: #2e1f4a; box-shadow: none; }
    body.dark .card:hover { border-color: #7c3aed; box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2); }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #000;
      margin-bottom: 4px;
    }

    body.dark .card-title { color: #f0ebff; }

    .card-desc {
      font-size: 14px;
      color: #6b7280;
      margin: 0;
    }

    body.dark .card-desc { color: #9d89c4; }

    footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid #ebebeb;
      font-size: 13px;
      color: #9ca3af;
    }

    body.dark footer { border-color: #2e1f4a; color: #6b5a8e; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>Our Apps</h1>
      <p class="meta">Support &amp; information for our iOS apps.</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
  </div>

  <div class="card-grid">
    <a href="./preak/" class="card">
      <div class="card-icon">💪</div>
      <div class="card-title">PReak</div>
      <p class="card-desc">Personal Record Tracker for iOS.</p>
    </a>
    <a href="./soundora/" class="card">
      <div class="card-icon">🎵</div>
      <div class="card-title">Soundora</div>
      <p class="card-desc">Ambient sound mixer for iOS.</p>
    </a>
  </div>

  <footer>
    <p>&copy; 2026 All rights reserved.</p>
  </footer>

</div>
<script>
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  const saved = localStorage.getItem('apps-theme');
  const isDark = saved ? saved === 'dark' : mq.matches;
  if (isDark) document.body.classList.add('dark');

  function toggleTheme() {
    const dark = document.body.classList.toggle('dark');
    localStorage.setItem('apps-theme', dark ? 'dark' : 'light');
  }
</script>
</body>
</html>
