<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ddly2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --bg: #1a1410; --fg: #f5ede0; --sub: rgba(245,237,224,0.35); --btn: rgba(245,237,224,0.07); --btn-border: rgba(245,237,224,0.13); }
    [data-theme="light"] { --bg: #fdf6ed; --fg: #2a1f0f; --sub: rgba(42,31,15,0.35); --btn: rgba(42,31,15,0.06); --btn-border: rgba(42,31,15,0.12); }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.3s, color 0.3s;
    }
    #greeting {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      transition: opacity 0.4s ease;
    }
    #lang {
      font-size: 0.78rem;
      color: var(--sub);
      letter-spacing: 0.12em;
      transition: opacity 0.4s ease;
    }
    .hidden { opacity: 0; }

    #footer {
      position: fixed;
      bottom: 2rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      font-size: 1rem;
      font-weight: 500;
    }
    #footer a {
      color: var(--fg);
      text-decoration: none;
      opacity: 0.45;
      transition: opacity 0.2s;
    }
    #footer a:hover { opacity: 1; }

    #top-right {
      position: fixed;
      top: 1.2rem; right: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    #color-code {
      font-size: 0.72rem;
      font-family: monospace;
      letter-spacing: 0.08em;
      color: var(--sub);
    }
    #theme-btn {
      background: var(--btn);
      border: 1px solid var(--btn-border);
      color: var(--fg);
      width: 32px; height: 32px;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #theme-btn:hover { background: var(--btn-border); }
    #theme-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
  </style>
</head>
<body>
  <div id="top-right">
    <span id="color-code" title="Background Color"></span>
    <button id="theme-btn" aria-label="Toggle theme"></button>
  </div>
  <div id="greeting">Hi there</div>
  <div id="lang">English</div>

  <div id="footer">
    <a href="apps/">apps</a>
    <a href="mailto:ddly2biz@gmail.com">contact</a>
  </div>

  <script>
    const greetings = [
      { text: "Hi there",     lang: "English"    },
      { text: "Bonjour",      lang: "French"     },
      { text: "Hola",         lang: "Spanish"    },
      { text: "こんにちは",    lang: "Japanese"   },
      { text: "Hallo",        lang: "German"     },
      { text: "Ciao",         lang: "Italian"    },
      { text: "Olá",          lang: "Portuguese" },
      { text: "안녕하세요",    lang: "Korean"     },
      { text: "Привет",       lang: "Russian"    },
      { text: "你好",          lang: "Chinese"    },
      { text: "مرحبا",        lang: "Arabic"     },
      { text: "नमस्ते",       lang: "Hindi"      },
      { text: "Merhaba",      lang: "Turkish"    },
      { text: "สวัสดี",       lang: "Thai"       },
      { text: "Hej",          lang: "Swedish"    },
      { text: "Γεια σου",     lang: "Greek"      },
      { text: "Witaj",        lang: "Polish"     },
      { text: "Xin chào",     lang: "Vietnamese" },
      { text: "Sawubona",     lang: "Zulu"       },
      { text: "Ahoj",         lang: "Czech"      },
    ];

    const gEl = document.getElementById('greeting');
    const lEl = document.getElementById('lang');
    let i = 0;

    function next() {
      gEl.classList.add('hidden');
      lEl.classList.add('hidden');
      setTimeout(() => {
        i = (i + 1) % greetings.length;
        gEl.textContent = greetings[i].text;
        lEl.textContent = greetings[i].lang;
        gEl.classList.remove('hidden');
        lEl.classList.remove('hidden');
      }, 400);
    }

    setInterval(next, 2000);

    // Generate random hue on every load
    const hue = Math.floor(Math.random() * 360);

    function hsl(h, s, l) { return `hsl(${h},${s}%,${l}%)` }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => { const k = (n + h / 30) % 12; const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); return Math.round(255 * c).toString(16).padStart(2, '0'); };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    const palette = {
      dark:  { bg: [hue, 20, 9],  fg: [hue, 30, 93] },
      light: { bg: [hue, 30, 96], fg: [hue, 25, 12] },
    };

    function setCSSVars(p, prefix) {
      const root = prefix === 'dark' ? document.documentElement : null;
      const sel  = prefix === 'dark' ? ':root' : '[data-theme="light"]';
      let style  = document.getElementById('theme-vars');
      if (!style) { style = document.createElement('style'); style.id = 'theme-vars'; document.head.appendChild(style); }
      const [dbg, dfg] = [palette.dark.bg, palette.dark.fg];
      const [lbg, lfg] = [palette.light.bg, palette.light.fg];
      style.textContent = `
        :root {
          --bg: ${hsl(...dbg)}; --fg: ${hsl(...dfg)};
          --sub: ${hsl(dfg[0], dfg[1], dfg[2] - 50)}80;
          --btn: ${hsl(dfg[0], dfg[1], dfg[2])}11;
          --btn-border: ${hsl(dfg[0], dfg[1], dfg[2])}22;
        }
        [data-theme="light"] {
          --bg: ${hsl(...lbg)}; --fg: ${hsl(...lfg)};
          --sub: ${hsl(lfg[0], lfg[1], lfg[2] + 40)}80;
          --btn: ${hsl(lfg[0], lfg[1], lfg[2])}0d;
          --btn-border: ${hsl(lfg[0], lfg[1], lfg[2])}22;
        }
      `;
    }

    setCSSVars();

    const btn = document.getElementById('theme-btn');
    const colorEl = document.getElementById('color-code');
    const dark = window.matchMedia('(prefers-color-scheme: dark)');
    let theme = localStorage.getItem('theme') || (dark.matches ? 'dark' : 'light');

    function applyTheme(t) {
      theme = t;
      document.documentElement.setAttribute('data-theme', t === 'dark' ? '' : 'light');
      btn.innerHTML = t === 'dark'
        ? `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
        : `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      localStorage.setItem('theme', t);
      const p = t === 'dark' ? palette.dark : palette.light;
      colorEl.textContent = hslToHex(...p.bg);
    }

    btn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
    applyTheme(theme);
  </script>
</body>
</html>
